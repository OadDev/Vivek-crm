name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      # Ships vendor/ (built here, not on the shared-hosting box) to the
      # server via rsync over SSH. Anything not listed here is left alone on
      # the server — .env, uploaded files, session/cache/log contents, and
      # storage/app/installed.lock all persist across deploys untouched.
      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "${{ secrets.HOSTINGER_PASSWORD }}" rsync -rltzv --delete \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='/.git/' --exclude='/.github/' --exclude='/tests/' \
            --exclude='/.env' --exclude='/.env.example' \
            --exclude='/storage/app/' --exclude='/storage/framework/cache/' \
            --exclude='/storage/framework/sessions/' --exclude='/storage/framework/views/' \
            --exclude='/storage/logs/' --exclude='/node_modules/' \
            ./ "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DEPLOY_PATH }}"

      # Hostinger's default `php` CLI alias may point at an older version
      # than the domain's configured PHP-FPM version (they're set
      # separately in hPanel). Picks the newest 8.2+ binary actually present
      # instead of assuming `php` resolves correctly.
      - name: Run post-deploy commands
        run: |
          sshpass -p "${{ secrets.HOSTINGER_PASSWORD }}" ssh -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no \
            "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}" \
            'cd ${{ secrets.HOSTINGER_DEPLOY_PATH }} && \
             PHP_BIN=$(command -v php8.4 || command -v php8.3 || command -v php8.2 || command -v php) && \
             echo "Using $PHP_BIN ($($PHP_BIN -v | head -1))" && \
             $PHP_BIN artisan migrate --force && \
             $PHP_BIN artisan config:cache && \
             $PHP_BIN artisan route:cache && \
             $PHP_BIN artisan view:cache && \
             $PHP_BIN artisan event:cache && \
             $PHP_BIN artisan queue:restart'
