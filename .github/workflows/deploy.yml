name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      # Ships vendor/ (built here, not on the shared-hosting box) to the
      # server via rsync over SSH. Anything not listed here is left alone on
      # the server — .env, uploaded files, session/cache/log contents, and
      # storage/app/installed.lock all persist across deploys untouched.
      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_PORT }}
          REMOTE_USER: ${{ secrets.HOSTINGER_USERNAME }}
          TARGET: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          ARGS: '-rltzv --delete'
          EXCLUDE: '/.git/, /.github/, /tests/, /.env, /.env.example, /storage/app/, /storage/framework/cache/, /storage/framework/sessions/, /storage/framework/views/, /storage/logs/, /node_modules/'

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.HOSTINGER_DEPLOY_PATH }}
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan queue:restart
